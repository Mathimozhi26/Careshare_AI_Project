name: CareShare AI - Appium Tests

on:
  push:
    branches: [ careshare-flutter ]
  pull_request:
    branches: [ careshare-flutter ]

jobs:
  flutter-build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-fatal-infos
      - name: Build debug APK
        run: flutter build apk --debug --no-tree-shake-icons
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: careshare-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  appium-tests:
    name: Run Appium Tests
    runs-on: macos-latest
    needs: flutter-build
    steps:
      - uses: actions/checkout@v4
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: careshare-debug-apk
          path: build/app/outputs/flutter-apk/
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2
      - name: Install Python dependencies
        run: |
          cd appium-tests
          pip install -r requirements.txt
      - name: Start Appium server
        run: appium &
      - name: Setup Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          profile: pixel_6
          arch: x86_64
          script: |
            mkdir -p appium-tests/screenshots
            cd appium-tests
            python -m pytest test_careshare.py -v --html=test_report.html || true
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-test-report
          path: |
            appium-tests/test_report.html
            appium-tests/screenshots/
